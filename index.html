<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Réseau Africain de Services Locaux</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Réseau Africain de Services Locaux</h1>

<!-- FORMULAIRE INSCRIPTION PRESTATAIRE -->
<section>
  <h2>Inscription Prestataire</h2>
  <form id="inscriptionForm">
    <input type="text" id="nom" placeholder="Nom complet" required>

    <select id="categorie" required>
      <option value="">Choisir une catégorie</option>
      <option value="Bâtiment">Bâtiment</option>
      <option value="Services Personnels">Services Personnels</option>
      <option value="Transport">Transport</option>
      <option value="Informatique">Informatique</option>
      <option value="Santé">Santé</option>
    </select>

    <select id="metier" required>
      <option value="">Choisir un métier</option>
    </select>

    <select id="zone" required>
      <option value="">Choisir une ville</option>
      <option value="Conakry">Conakry</option>
      <option value="Kindia">Kindia</option>
      <option value="Kankan">Kankan</option>
      <option value="Labé">Labé</option>
      <option value="Nzérékoré">Nzérékoré</option>
      <option value="Mamou">Mamou</option>
    </select>

    <input type="text" id="telephone" placeholder="Téléphone / WhatsApp" required>
    <button type="submit">S’inscrire</button>
  </form>

  <!-- Message de confirmation -->
  <p id="messageInscription" style="color: green; font-weight: bold;"></p>
</section>

<hr>

<!-- RECHERCHE CLIENT -->
<section>
  <h2>Rechercher un prestataire</h2>
  <input type="text" id="searchInput" placeholder="Rechercher un métier...">
  <div id="prestatairesResults"></div>
</section>

<!-- FIREBASE CDN -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-analytics-compat.js"></script>

<script src="script.js"></script>
</body>
    </html>
