<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Prestataire</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Inscription Prestataire</h1>
    </header>

    <main>
        <form id="prestataireForm">
            <label>Nom et prénom:</label>
            <input type="text" name="nom" required>

            <label>Métier:</label>
            <input type="text" name="metier" required>

            <label>Catégorie:</label>
            <select name="categorie" required>
                <option value="">Sélectionner</option>
                <option value="Bâtiment">Bâtiment</option>
                <option value="Domestique">Domestique</option>
                <option value="Numérique">Numérique</option>
                <option value="Santé">Santé</option>
                <option value="Commerce">Commerce</option>
                <option value="Autres">Autres</option>
            </select>

            <label>Zone / Quartier:</label>
            <input type="text" name="zone" required>

            <label>Téléphone / WhatsApp:</label>
            <input type="text" name="telephone" required>

            <label>Tarif (optionnel):</label>
            <input type="text" name="tarif">

            <button type="submit">S’inscrire</button>
        </form>

        <div id="message"></div>
    </main>

    <footer>
        <p>© 2026 Services Locaux</p>
    </footer>

    <script src="script.js"></script>
</body>
      </html>
