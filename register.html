<!DOCTYPE html>
<html>
<head>
  <title>Inscription</title>
</head>
<body>

<h2>Créer un compte</h2>

<input type="text" id="nom" placeholder="Nom"><br>
<input type="text" id="metier" placeholder="Métier (maçon, plombier...)"><br>
<input type="text" id="telephone" placeholder="Téléphone"><br>
<input type="text" id="quartier" placeholder="Ville / Quartier"><br>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Mot de passe"><br>

<button onclick="register()">S'inscrire</button>

<script type="module">
import { registerEmail } from './auth.js';

window.register = () => {
  registerEmail(
    nom.value,
    metier.value,
    telephone.value,
    quartier.value,
    email.value,
    password.value
  );
}
</script>

</body>
</html>
