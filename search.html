<!DOCTYPE html>
<html>
<head>
  <title>Recherche</title>
</head>
<body>

<h2>Chercher un travailleur</h2>

<input type="text" id="ville" placeholder="Ville"><br>
<input type="text" id="metier" placeholder="Métier"><br>

<button onclick="search()">Rechercher</button>

<div id="results"></div>

<script type="module">
import { db } from './firebaseConfig.js';
import { ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

window.search = async () => {
  const ville = document.getElementById("ville").value.toLowerCase();
  const metier = document.getElementById("metier").value.toLowerCase();

  const snapshot = await get(ref(db, 'prestataires'));
  const data = snapshot.val();

  let html = "";

  for (let id in data) {
    let user = data[id];

    if (
      user.quartier.toLowerCase().includes(ville) &&
      user.metier.toLowerCase().includes(metier)
    ) {
      html += `
        <div style="border:1px solid black; margin:10px; padding:10px;">
          <h3>${user.nom}</h3>
          <p>Métier: ${user.metier}</p>
          <p>Ville: ${user.quartier}</p>
          <p>Téléphone: ${user.telephone}</p>
        </div>
      `;
    }
  }

  document.getElementById("results").innerHTML = html || "Aucun résultat";
}
</script>

</body>
</html>
